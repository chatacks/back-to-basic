<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App HTML</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  <link rel="stylesheet" href="./styles.css">

</head>

<body>
  <div class="app-container">
    <div class="left-column">
      <nav class="navbar-container">
        <img src="./images/logo.svg" alt="Clima Hoje">
        <div class="input-container">
          <input class="custom-input" type="text" name="city" id="city" placeholder="Procure por cidades">
          <span class="material-symbols-outlined search-input-icon">
            search
          </span>
        </div>
      </nav>

      <div class="showcase-container">
        <div class="showcase-text">
          <h2>Rio de Janeiro</h2>
          <p>Chance de chuva 0%</p>
          <h2>28º</h2>
        </div>
        <img src="./images/sun clouds.svg" alt="Sol com poucas nuvens">
      </div>
    </div>
  </div>
</body>

</html>
